# Keys with name admin-* are generate from `age-keygen -y ~/.config/sops/age/keys.txt`,
# where keys.txt are age secret keys generated from user's private key.
# server-* are generated from `cat id_ed25519.pub | ssh-to-age`, where id_ed25519.pub
# is the public key of the server.
#
# More info can be found on https://github.com/Mic92/sops-nix

keys:
  - &admin-ailrk age1v04egmuypzp5t5styx2srwdmawelmt0da495xpfu0738uun7zswsx8qrq8

creation_rules:
  - path_regex: secrets/[^/]+\.(yaml|json|env|ini)$
    key_groups:
    - age:
      - *admin-ailrk
